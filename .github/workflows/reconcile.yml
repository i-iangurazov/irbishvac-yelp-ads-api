name: Reconcile Yelp Async Workflows

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: reconcile-yelp-async
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call internal reconcile and follow-up workers
        env:
          RECONCILE_URL: ${{ secrets.RECONCILE_URL }}
          AUTORESPONDER_FOLLOWUPS_URL: ${{ secrets.AUTORESPONDER_FOLLOWUPS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RECONCILE_URL" ]; then
            echo "RECONCILE_URL secret is not configured."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not configured."
            exit 1
          fi

          FOLLOWUPS_URL="${AUTORESPONDER_FOLLOWUPS_URL:-${RECONCILE_URL%/api/internal/reconcile}/api/internal/autoresponder/followups}"
          FULL_RECONCILE_URL="${RECONCILE_URL}?programJobLimit=25&leadWebhookLimit=25&scheduledReportLimit=10&reportLimit=10&reportDeliveryLimit=20&autoresponderFollowUpLimit=0&connectorLifecycleLimit=10"
          WEBHOOK_ONLY_RECONCILE_URL="${RECONCILE_URL}?programJobLimit=0&leadWebhookLimit=25&scheduledReportLimit=0&reportLimit=0&reportDeliveryLimit=0&autoresponderFollowUpLimit=0&connectorLifecycleLimit=0"
          FOLLOWUPS_URL_WITH_LIMIT="${FOLLOWUPS_URL}?limit=20"

          curl --fail-with-body --silent --show-error --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$FULL_RECONCILE_URL"

          curl --fail-with-body --silent --show-error --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$WEBHOOK_ONLY_RECONCILE_URL"

          curl --fail-with-body --silent --show-error --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$WEBHOOK_ONLY_RECONCILE_URL"

          curl --fail-with-body --silent --show-error --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$WEBHOOK_ONLY_RECONCILE_URL"

          curl --fail-with-body --silent --show-error --retry 2 --retry-delay 5 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$FOLLOWUPS_URL_WITH_LIMIT"
